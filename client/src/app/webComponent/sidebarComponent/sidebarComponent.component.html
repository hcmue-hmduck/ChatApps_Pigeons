<!-- ====================================================
     SHELL: Sidebar + Content Area
     ==================================================== -->
<div class="app-shell">

    <!-- ── NAV SIDEBAR (Always show) ── -->
    <aside class="icon-sidebar">
        <img src="assets/PigeonLogo.png" alt="Pigeons" class="sidebar-logo">
        <nav class="nav-icons">
            <button class="sidebar-nav-btn" [class.active]="isActive('messages')" title="Tin nhắn"
                (click)="setView('messages')">
                <i class="bi bi-chat-dots"></i>
                <span class="nav-tooltip">Tin nhắn</span>
            </button>
            <button class="sidebar-nav-btn" [class.active]="isActive('friends')" title="Liên hệ"
                (click)="setView('friends')">
                <i class="bi bi-people"></i>
                <span class="nav-tooltip">Liên hệ</span>
            </button>
            <button class="sidebar-nav-btn" [class.active]="isActive('newFeeds')" title="Bảng tin"
                (click)="setView('newFeeds')">
                <i class="bi bi-newspaper"></i>
                <span class="nav-tooltip">Bảng tin</span>
            </button>
        </nav>
        <!-- User Avatar & Modal Trigger -->
        <div class="sidebar-bottom">
            <!-- User Avatar if ready -->
            <img [src]="userInfo()?.avatar_url" alt="avatar" class="sidebar-user-avatar" title="Hồ sơ cá nhân"
                *ngIf="userInfo()" (click)="userProfileModal.open(currentUserId)">

            <!-- Placeholder if loading -->
            <div class="sidebar-user-avatar-placeholder" *ngIf="!userInfo()">
                <i class="bi bi-person"></i>
            </div>
            <button class="sidebar-logout-btn" title="Đăng xuất">
                <i class="bi bi-box-arrow-right"></i>
                <span class="nav-tooltip">Đăng xuất</span>
            </button>
        </div>
    </aside>

    <!-- ── CONTENT AREA ── -->
    <div class="content-area">

        <!-- ── BLURRED LOADING OVERLAY ── -->
        <div class="content-loading-overlay" [class.visible]="loading() || !isReady()">
            <div class="spinner-accent"></div>
            <p class="loading-text">Loading...</p>
        </div>

        <!-- VIEW: Messages (Panel 2 + Panel 3) -->
        <conversation-layout [style.display]="navService.activeView() === 'messages' ? 'flex' : 'none'"
            [currentUserId]="currentUserId">
        </conversation-layout>

        <!-- VIEW: Friends -->
        <relationship-layout [style.display]="navService.activeView() === 'friends' ? 'flex' : 'none'"
            [currentUserId]="currentUserId">
        </relationship-layout>

        <new-feeds-layout [style.display]="navService.activeView() === 'newFeeds' ? 'flex' : 'none'"
            [userInfor]="userInfo()">
        </new-feeds-layout>

    </div>

    <!-- Child Profile Modal Component -->
    <user-infor-modal #userProfileModal [currentUserId]="currentUserId" [editPremission]="true"
        (profileUpdated)="handleProfileUpdate($event)"></user-infor-modal>
</div>
