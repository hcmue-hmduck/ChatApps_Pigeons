<div class="conv-root search-conv-root">
  <section class="search-glass-panel">
        <div class="filter-section search-form-section">
          <div class="search-bar-wrapper">
            <div class="search-icon-box">
              <i class="bi bi-search search-icon"></i>
            </div>
            <input
              type="text"
              [(ngModel)]="searchKeyword"
              (keyup.enter)="onSearch()"
              class="search-input-field"
              placeholder="Search by name, username or user ID..."
            />
            <button
              class="search-submit-btn"
              (click)="onSearch()"
              [disabled]="isSearching()"
            >
              <span *ngIf="!isSearching()">Search</span>
              <div *ngIf="isSearching()" class="spinner-border spinner-border-sm" role="status"></div>
            </button>
          </div>
        </div>

        <div class="list-container results-layout">
          <div class="results-header">
            <h3 class="results-title">
              <i class="bi bi-person-plus title-icon"></i>
              <span>Suggested People ({{ searchResults().length }})</span>
            </h3>
            <button class="reset-search-btn" (click)="loadingData()">
              Reset Filter
            </button>
          </div>

          <div *ngIf="isSearching() && searchResults().length === 0" class="search-results-grid skeleton-mode">
            <div *ngFor="let i of [1,2,3,4,5,6]" class="skeleton-card">
              <div class="skeleton-avatar"></div>
              <div class="skeleton-text-lg"></div>
              <div class="skeleton-text-sm"></div>
              <div class="skeleton-btn"></div>
            </div>
          </div>

          <div *ngIf="!isSearching() && searchResults().length === 0" class="empty-results-state">
            <i class="bi bi-person-x empty-state-icon"></i>
            <h4 class="empty-state-title">No users found</h4>
            <p class="empty-state-msg">Try searching for a different name or browse suggestions.</p>
            <button (click)="loadingData()" class="reset-search-btn">
              Reload Suggestions
            </button>
          </div>

          <div *ngIf="searchResults().length > 0" class="search-results-grid">
            <div
              *ngFor="let user of searchResults()"
              class="search-profile-card animate-card-up"
            >
              <div class="profile-card-header">
                <div class="card-avatar-container" [class.is-online]="user.status === 'online'">
                  <img
                    [src]="user.avatar_url || 'assets/default-avatar.png'"
                    [alt]="user.full_name"
                    class="card-avatar-img"
                    referrerPolicy="no-referrer"
                  />
                  <span *ngIf="user.status === 'online'" class="online-pulse-dot"></span>
                </div>
              </div>

              <div class="profile-card-body">
                <h4 class="user-full-name">{{ user.full_name }}</h4>
                <p class="user-meta-info">
                  {{ user.mutualFriends || 0 }} mutual friends
                </p>
              </div>

              <div class="profile-card-actions">
                <button
                  *ngIf="!isRequestSent(user.id)"
                  class="btn-primary-neon"
                  (click)="sendFriendRequest(user.id)"
                >
                  <i class="bi bi-person-plus-fill"></i>
                  Add Friend
                </button>

                <button
                  *ngIf="isRequestSent(user.id)"
                  class="btn-disabled-glass"
                  disabled
                >
                  <i class="bi bi-clock-history"></i>
                  Request Sent
                </button>

                <button
                  (click)="sendMessage(user.id)"
                  class="btn-secondary-glass"
                >
                  <i class="bi bi-chat-dots"></i>
                  Message
                </button>
              </div>
            </div>
          </div>

          <div class="pagination-footer" *ngIf="searchResults().length > 0">
            <button class="load-more-btn">
              Load More Suggestions
            </button>
          </div>
        </div>

  </section>
</div>
