<div class="conversation-layout-header">
    <div class="sidebar">
        
        <div class="conversation-header">
            <h1>Hội thoại</h1>
            <div class="header-actions">
                <button (click)="openSetting()">...</button>
                <button (click)="createConversation()">+</button>
            </div>
        </div>

        <div class="searchConversation">
            <input type="text" placeholder="Tìm kiếm hội thoại..." />
        </div>

        <div class="filterConversation">
            <button (click)="filter()">Tất cả</button>
            <button (click)="filter()">Chưa đọc</button>
        </div>


        <div *ngIf="!isLoaded" class="no-conversation">Không có hội thoại nào.</div>
        <ng-container *ngIf="conversations().homeConversationData">
            <ng-container *ngFor="let conv of conversations().homeConversationData">
                <div (click)="handleConversationID(conv)" class="conversation-item">
                    
                    <ng-container *ngIf="conv.type === 'group'">
                        <ng-container *ngIf="conv.avatar_url && conv.avatar_url.trim(); else noAvatar">
                            <div class="avatar-wrapper">
                                <img class="avatar-single" [src]="conv.avatar_url" [alt]="conv.title">
                                <div class="dot-container">
                                    <span class="status-dot" [ngClass]="hasOnlineUser(conv) ? 'online' : 'offline'"></span>
                                </div>
                            </div>
                        </ng-container>

                        <ng-template #noAvatar>
                            <div class="avatar-wrapper">
                                <div class="avatar-group" [ngClass]="{
                                'four': (conv.participants?.length || 0) === 4,
                                'three': (conv.participants?.length || 0) === 3 }">
                                    <ng-container *ngFor="let p of (conv.participants || []).slice(0,4); let i = index">
                                        <img class="avatar-group-item avatar-pos-{{i}}"
                                            [src]="p.avatar_url || 'https://i.pravatar.cc/150?img=1'" [alt]="p.full_name">
                                    </ng-container>
                                </div>
                                <div class="dot-container">
                                    <span class="status-dot" [ngClass]="hasOnlineUser(conv) ? 'online' : 'offline'"></span>
                                </div>
                            </div>
                        </ng-template>
                    </ng-container>

                    <ng-container *ngIf="conv.type === 'direct' && getOtherParticipant(conv) as other">
                        <div class="avatar-wrapper">
                            <img class="avatar-single" [src]="other.avatar_url || 'https://i.pravatar.cc/150?img=1'"
                                [alt]="other.full_name || 'avatar'">
                            <div class="dot-container">
                                <span class="status-dot" [ngClass]="isUserOnline(other.user_id) ? 'online' : 'offline'"></span>
                            </div>
                        </div>
                    </ng-container>

                    <div class="conv-info">
                        <div class="conv-title">
                            {{ conv.title }}
                            <span class="conv-type" [ngClass]="conv.type">{{ conv.type === 'group' ? 'Nhóm' : 'Cá nhân' }}</span>
                        </div>
                        <div class="conv-last">
                            <ng-container *ngIf="conv.lastMessage">
                                <span class="msg-sender">{{ getLastMessageSenderName(conv) }}</span>
                                <span class="msg-content">{{ conv.lastMessage.content }}</span>
                                <span class="msg-separator">&nbsp;&middot;&nbsp;</span><span class="msg-time">{{ relativeTime(conv.lastMessage.created_at, tick1s(), tick60s(), tick3600s()) }}</span>
                            </ng-container>
                            <span *ngIf="!conv.lastMessage" class="no-message">Chưa có tin nhắn</span>
                        </div>
                    </div>
                </div>
            </ng-container>
        </ng-container>
    </div>
    <div class="message-content">
            <messages-layout *ngIf="selectedConversationId" 
                            [conversationId]="selectedConversationId"
                            [currentUserId]="currentUserId"
                            [getMessageInfor]="getMessageInfor"/>
    </div>
</div>
