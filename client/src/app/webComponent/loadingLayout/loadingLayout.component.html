<div class="loading-container grid-bg">
    <!-- Header / Logo Area -->
    <header class="loading-header">
        <div class="logo-area">
            <i class="bi bi-terminal logo-icon"></i>
            <h2 class="logo-text">CyberChat</h2>
        </div>

        <div class="encrypted-status">
            <span class="pulse-dot"></span>
            Encrypted
        </div>
    </header>

    <!-- Main Loading Content -->
    <main class="loading-main">
        <div class="loader-wrap">
            <!-- Loader -->
            <div class="loader-visual">
                <!-- Outer Spinning Ring -->
                <div class="spinning-ring"></div>

                <!-- Inner Fingerprint Icon -->
                <div class="fingerprint-icon">
                    <i class="bi bi-fingerprint"></i>
                </div>

                <!-- Subtle Glow -->
                <div class="loader-glow"></div>
            </div>

            <!-- Status Text -->
            <div class="status-area">
                <h3 class="status-title">
                    Initializing Neural Link...
                </h3>
                <div class="bouncing-dots">
                    <span class="dot" style="--delay: 0s"></span>
                    <span class="dot" style="--delay: 0.15s"></span>
                    <span class="dot" style="--delay: 0.3s"></span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="loading-footer">
        <p class="footer-note">
            Secure Uplink Established
        </p>
    </footer>

    <!-- Background scanline effect -->
    <div class="scanlines"></div>
</div>
