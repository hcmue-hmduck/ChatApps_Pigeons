<div class="messages-layout-wrapper">
    <div *ngIf="!isLoaded" style="padding: 24px; color: #888; text-align: center;">
        Không có tin nhắn nào.
    </div>
    
    <ng-container *ngIf="getMessagesData().homeMessagesData">
        <div class="messages-title">
            {{ getMessageInfor.title || 'Conversation' }}
        </div>
        
        <div class="messages-content" #messagesContent (scroll)="onMessagesScroll()">
            <!-- Container chứa tin nhắn (reversed) -->
            <div class="messages-container">
                <ng-container *ngFor="let msg of getMessagesData().homeMessagesData.messages; let i = index">
                    <ng-container *ngIf="msg.message_type === 'system'; else userMsg">
                        <div class="message-system">{{ msg.content }}</div>
                    </ng-container>
                    
                    <ng-template #userMsg>
                        <ng-container *ngIf="currentUserId === msg.sender_id; else otherMsg">
                            <!-- Tin nhắn của tôi -->
                            <div class="message-row me-row">
                                <div class="me-row-content">
                                    <div class="message-actions">
                                        <button class="more-icon" title="Tùy chọn" (click)="toggleMenu(msg.id)">
                                            <i class="fas fa-ellipsis-v"></i>
                                        </button>
                                        <div class="dropdown-menu" *ngIf="showMenuId === msg.id">
                                            <button class="dropdown-item" *ngIf="msg.message_type === 'text'" (click)="openEditModal(msg)">Sửa</button>
                                            <button class="dropdown-item" (click)="deleteMessage(msg)">Gỡ</button>
                                            <button class="dropdown-item" (click)="forwardMessage(msg)">Chuyển tiếp</button>
                                            <button class="dropdown-item" (click)="pinMessage(msg)">Ghim</button>
                                        </div>
                                    </div>
                                    <div class="me">{{ msg.content }}</div>
                                </div>
                            </div>
                        </ng-container>
                        
                        <ng-template #otherMsg>
                            <!-- Tin nhắn của người khác -->
                            <div class="message-row other-row">
                                <div *ngIf="getMessagesData().homeMessagesData.conversation_type === 'group' && 
                                            (i === 0 || getMessagesData().homeMessagesData.messages[i-1].sender_id !== msg.sender_id || 
                                             getMessagesData().homeMessagesData.messages[i-1].message_type === 'system')"
                                     class="sender-name">
                                    {{ msg.sender_name }}
                                </div>
                                
                                <div class="other-row-content">
                                    <div *ngIf="i === getMessagesData().homeMessagesData.messages.length - 1 || 
                                                getMessagesData().homeMessagesData.messages[i+1].sender_id !== msg.sender_id || 
                                                getMessagesData().homeMessagesData.messages[i+1].message_type === 'system'"
                                         class="avatar-container">
                                        <img class="avatar"
                                            [src]="msg.sender_avatar || 'https://i.pravatar.cc/40?img=' + msg.sender_id"
                                            [alt]="msg.sender_name"
                                            (error)="msg.sender_avatar = 'https://i.pravatar.cc/40?u=' + msg.sender_id">
                                    </div>
                                    
                                    <div *ngIf="!(i === getMessagesData().homeMessagesData.messages.length - 1 || 
                                                getMessagesData().homeMessagesData.messages[i+1].sender_id !== msg.sender_id || 
                                                getMessagesData().homeMessagesData.messages[i+1].message_type === 'system')"
                                         class="avatar-placeholder">
                                    </div>
                                    
                                    <div class="message-content-wrapper">
                                        <div class="other">{{ msg.content }}</div>
                                        <div class="message-actions">
                                            <button class="more-icon" title="Tùy chọn"
                                                (click)="toggleMenu(msg.id)">
                                                <i class="fas fa-ellipsis-v"></i>
                                            </button>
                                            <div class="dropdown-menu" *ngIf="showMenuId === msg.id">
                                                <button class="dropdown-item" (click)="forwardMessage(msg)">Chuyển tiếp</button>
                                                <button class="dropdown-item" (click)="pinMessage(msg)">Ghim</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </ng-template>
                    </ng-template>
                </ng-container>
            </div> <!-- Kết thúc messages-container -->
        </div> <!-- Kết thúc messages-content -->

        <!-- Nút scroll to bottom -->
        <div class="scroll-to-bottom" 
            [class.visible]="showScrollToBottom"
            (click)="scrollToBottomClicked()"
            title="Cuộn xuống dưới cùng">
            <i class="fas fa-chevron-down"></i>
            <span class="new-badge" *ngIf="hasNewMessage">New</span>
        </div>
        
        <div class="messages-input">
            <button class="attach-btn" title="Đính kèm tệp" type="button">
                <i class="fas fa-paperclip"></i>
            </button>
            <input class="msg-input" [(ngModel)]="newMessage" type="text" placeholder="Type a message..." 
                (keyup.enter)="handleSendBtn()" />
            <button class="send-btn" (click)="handleSendBtn()" title="Gửi">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </ng-container>
</div>

<!-- Modal sửa tin nhắn -->
<div class="edit-modal-backdrop" *ngIf="editingMessage">
    <div class="edit-modal">
        <div class="edit-modal-title">Sửa tin nhắn</div>
        <textarea [(ngModel)]="editingContent" rows="3" class="edit-modal-input"></textarea>
        <div class="edit-modal-actions">
            <button (click)="saveEditModal()">Lưu</button>
            <button (click)="closeEditModal()">Hủy</button>
        </div>
    </div>
</div>
